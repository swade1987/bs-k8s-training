# 03-test-workloads.yaml
# Simple nginx pods in each namespace used to validate isolation
# Run the validation script below after deploying

apiVersion: v1
kind: Pod
metadata:
  name: web
  namespace: customer-a
  labels:
    app: web
spec:
  containers:
    - name: nginx
      image: nginx:alpine
      ports:
        - containerPort: 80

---

apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: customer-a
spec:
  selector:
    app: web
  ports:
    - port: 80

---

apiVersion: v1
kind: Pod
metadata:
  name: web
  namespace: customer-b
  labels:
    app: web
spec:
  containers:
    - name: nginx
      image: nginx:alpine
      ports:
        - containerPort: 80

---

apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: customer-b
spec:
  selector:
    app: web
  ports:
    - port: 80
