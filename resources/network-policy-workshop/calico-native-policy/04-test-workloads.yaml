# 04-test-workloads.yaml
# Same nginx workloads as the K8s NetworkPolicy demo — reusable.
# If you already have these running from the previous demo, skip this file.

apiVersion: v1
kind: Namespace
metadata:
  name: customer-a
  labels:
    tenant: customer-a

---

apiVersion: v1
kind: Namespace
metadata:
  name: customer-b
  labels:
    tenant: customer-b

---

apiVersion: v1
kind: Pod
metadata:
  name: web
  namespace: customer-a
  labels:
    app: web
spec:
  containers:
    - name: nginx
      image: nginx:alpine
      ports:
        - containerPort: 80

---

apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: customer-a
spec:
  selector:
    app: web
  ports:
    - port: 80

---

apiVersion: v1
kind: Pod
metadata:
  name: web
  namespace: customer-b
  labels:
    app: web
spec:
  containers:
    - name: nginx
      image: nginx:alpine
      ports:
        - containerPort: 80

---

apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: customer-b
spec:
  selector:
    app: web
  ports:
    - port: 80
